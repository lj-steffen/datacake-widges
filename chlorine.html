<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; display: flex; justify-content: center; align-items: flex-start; padding-top: 1rem; font-family: sans-serif; }
.kouter { position: relative; width: 100px; height: 170px; border: 3px solid #222; border-radius: 5px 5px 3px 3px; overflow: hidden; background: #fff; }
.khandle { position: absolute; top: -2px; left: 50%; transform: translateX(-50%); width: 32px; height: 12px; border: 3px solid #222; border-bottom: 3px solid #fff; border-radius: 3px 3px 0 0; background: #fff; z-index: 2; }
.kfill { position: absolute; bottom: 0; left: 0; width: 100%; transition: height .6s ease; }
.kfill::after { content: ''; position: absolute; top: 0; left: -50%; width: 200%; height: 5px; background: rgba(255,255,255,.3); border-radius: 50%; animation: kwave 2.5s ease-in-out infinite; }
@keyframes kwave { 0%,100% { transform: translateX(0); } 50% { transform: translateX(15px); } }
.knum { font-size: 28px; font-weight: 600; line-height: 1; color: #222; }
.kunit { font-size: 14px; color: #888; }
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;gap:1rem;">
  <div style="position:relative;margin-top:10px;">
    <div class="khandle"></div>
    <div class="kouter">
      <div class="kfill" id="fill"></div>
      <svg style="position:absolute;top:0;right:0;width:14px;height:100%;overflow:visible;" preserveAspectRatio="none">
        <line x1="2" y1="17%" x2="10" y2="17%" stroke="#222" stroke-width="2"/>
        <line x1="2" y1="34%" x2="10" y2="34%" stroke="#222" stroke-width="2"/>
        <line x1="2" y1="50%" x2="10" y2="50%" stroke="#222" stroke-width="2"/>
        <line x1="2" y1="67%" x2="10" y2="67%" stroke="#222" stroke-width="2"/>
        <line x1="2" y1="83%" x2="10" y2="83%" stroke="#222" stroke-width="2"/>
      </svg>
    </div>
  </div>
  <div style="display:flex;align-items:baseline;gap:3px">
    <span class="knum" id="num">--</span><span class="kunit">%</span>
  </div>
</div>
<script>
var FIELD = 'FILL_LEVEL_CHLORINE';
var COLOR_HIGH = '#8B5F8C';
var COLOR_MID = '#6B4070';
var COLOR_LOW = '#E24B4A';

function setLevel(v) {
  v = Math.min(100, Math.max(0, Math.round(v)));
  document.getElementById('fill').style.height = v + '%';
  document.getElementById('num').textContent = v;
  var f = document.getElementById('fill');
  if (v > 50) { f.style.background = COLOR_HIGH; }
  else if (v > 20) { f.style.background = COLOR_MID; }
  else { f.style.background = COLOR_LOW; }
}

fetch('/.netlify/functions/datacake?field=' + FIELD)
  .then(function(r){ return r.json(); })
  .then(function(d){ setLevel(parseFloat(d.value)); })
  .catch(function(){ document.getElementById('num').textContent = '?'; });
</script>
</body>
</html>
