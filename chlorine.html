
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; display: flex; justify-content: center; align-items: flex-start; padding-top: 1rem; font-family: sans-serif; }
.kouter { position: relative; width: 100px; height: 170px; border: 2px solid #999; border-radius: 5px 5px 3px 3px; overflow: hidden; background: #f0f0f0; }
.khandle { position: absolute; top: -2px; left: 50%; transform: translateX(-50%); width: 32px; height: 12px; border: 2px solid #999; border-bottom: 2px solid #f0f0f0; border-radius: 3px 3px 0 0; background: #f0f0f0; z-index: 2; }
.kfill { position: absolute; bottom: 0; left: 0; width: 100%; transition: height .6s ease; }
.kfill::after { content: ''; position: absolute; top: 0; left: -50%; width: 200%; height: 5px; background: rgba(255,255,255,.3); border-radius: 50%; animation: kwave 2.5s ease-in-out infinite; }
@keyframes kwave { 0%,100% { transform: translateX(0); } 50% { transform: translateX(15px); } }
.kmarks { position: absolute; right: 0; top: 0; width: 12px; height: 100%; display: flex; flex-direction: column; justify-content: space-around; padding: 8px 0; pointer-events: none; }
.kmark { width: 6px; height: 1px; background: #ccc; margin-left: auto; }
.knum { font-size: 28px; font-weight: 600; line-height: 1; color: #222; }
.kunit { font-size: 14px; color: #888; }
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;gap:1rem;">
  <div style="position:relative;margin-top:10px;">
    <div class="khandle"></div>
    <div class="kouter">
      <div class="kfill" id="fill"></div>
      <div class="kmarks"><div class="kmark"></div><div class="kmark"></div><div class="kmark"></div><div class="kmark"></div><div class="kmark"></div></div>
    </div>
  </div>
  <div style="display:flex;align-items:baseline;gap:3px">
    <span class="knum" id="num">--</span><span class="kunit">%</span>
  </div>
</div>
<script>
var API_TOKEN = 'a34244519f5e5c9fbcf213c7639219807ac5ae4a';
var DEVICE_ID = '7c087f2f-577e-47b1-b38f-d728deeb6860';
var FIELD = 'FILL_LEVEL_CHLORINE';

function setLevel(v) {
  v = Math.min(100, Math.max(0, Math.round(v)));
  document.getElementById('fill').style.height = v + '%';
  document.getElementById('num').textContent = v;
  var f = document.getElementById('fill');
  if (v > 50) { f.style.background = '#378ADD'; }
  else if (v > 20) { f.style.background = '#EF9F27'; }
  else { f.style.background = '#E24B4A'; }
}

var query = 'query { device(deviceId:"' + DEVICE_ID + '") { currentMeasurements(allActiveFields: true) { value field { fieldName } } } }';
fetch('https://api.datacake.co/graphql/', {
  method: 'POST',
  headers: { 'Authorization': 'Token ' + API_TOKEN, 'Content-Type': 'application/json' },
  body: JSON.stringify({ query: query })
})
.then(function(r){ return r.json(); })
.then(function(d){
  var measurements = d.data.device.currentMeasurements;
  for (var i = 0; i < measurements.length; i++) {
    if (measurements[i].field.fieldName === FIELD) {
      setLevel(parseFloat(measurements[i].value));
      return;
    }
  }
  document.getElementById('num').textContent = '?';
})
.catch(function(){ document.getElementById('num').textContent = '?'; });
</script>
</body>
</html>
